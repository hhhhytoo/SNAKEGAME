<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>snake game</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 10px;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }
        .lobby {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(78, 204, 163, 0.3);
            border-radius: 40px;
            padding: 30px 20px;
            width: 100%;
            text-align: center;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .pixel-snake-logo {
            display: inline-grid;
            grid-template-columns: repeat(5, 24px);
            gap: 3px;
            background: transparent;
            margin-bottom: 15px;
            justify-content: center;
        }
        .pixel-row {
            display: contents;
        }
        .pixel-cell {
            width: 24px;
            height: 24px;
            background: #1e2b3a;
            border-radius: 3px;
        }
        .pixel-cell.snake {
            background: #4ecca3;
            box-shadow: 0 0 10px #4ecca3, 0 0 20px #2b7a62;
        }
        .pixel-cell.snake-head {
            background: #6de5b6;
            box-shadow: 0 0 15px #4ecca3, 0 0 30px #4ecca3;
        }
        .lobby h1 {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 900;
            margin: 5px 0 5px;
            background: linear-gradient(135deg, #a8e6cf, #4ecca3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px #4ecca3;
            letter-spacing: 4px;
        }
        .lobby .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 30px;
        }
        .lobby .input-group {
            margin: 20px 0;
        }
        .lobby input {
            background: rgba(255,255,255,0.1);
            border: 2px solid #4ecca3;
            border-radius: 60px;
            padding: 15px 25px;
            font-size: 20px;
            color: white;
            width: 80%;
            outline: none;
            text-align: center;
        }
        .lobby input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .lobby .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }
        .lobby-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid #4ecca3;
            color: white;
            font-size: 20px;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .lobby-btn:hover {
            background: #4ecca3;
            color: #1a2a3a;
            transform: scale(1.05);
        }
        .lobby .leaderboard-link {
            background: none;
            border: 2px solid rgba(255,255,255,0.2);
            color: #ccc;
        }
        .lobby .leaderboard-link:hover {
            border-color: #4ecca3;
            color: white;
        }
        .game-wrapper {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            padding: 15px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            display: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border: 2px solid rgba(255,255,255,0.2);
            background: #1e2b3a;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            cursor: pointer;
        }
        .score-board {
            color: #a8e6cf;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 700;
            text-align: center;
            margin-top: 10px;
            text-shadow: 0 0 10px #4ecca3;
        }
        .current-player {
            margin-top: 5px;
            text-align: center;
            color: #a8e6cf;
            font-size: clamp(14px, 4vw, 18px);
        }
        .touch-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            gap: 8px;
        }
        .arrow-row {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .arrow-btn {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.1s;
        }
        .arrow-btn:active {
            background: rgba(78, 204, 163, 0.5);
            transform: scale(0.9);
            border-color: #4ecca3;
        }
        @media (max-width: 600px) {
            .arrow-btn {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }
        }
        .back-to-lobby {
            margin-top: 20px;
            text-align: center;
        }
        .back-to-lobby button {
            background: rgba(255,255,255,0.1);
            border: 1px solid #4ecca3;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
        }
        .back-to-lobby button:hover {
            background: #4ecca3;
            color: black;
        }
        .leaderboard-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .leaderboard-modal.active {
            display: flex;
        }
        .leaderboard-panel {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(16px);
            border: 2px solid #4ecca3;
            border-radius: 40px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .leaderboard-header h2 {
            font-size: 28px;
            margin: 0;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .close-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 30px;
            cursor: pointer;
        }
        .close-btn:hover {
            color: white;
        }
        .refresh-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #4ecca3;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .refresh-btn:hover {
            background: #4ecca3;
            color: black;
        }
        .scores-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .scores-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 18px;
        }
        .scores-list .rank {
            color: #4ecca3;
            font-weight: 700;
            margin-right: 10px;
        }
        .scores-list .name {
            flex: 1;
        }
        .scores-list .score {
            color: #ffd93d;
            font-weight: 700;
        }
        .scores-list .date {
            font-size: 12px;
            color: #888;
            margin-left: 10px;
        }
        .loading-msg, .error-msg {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Lobby Screen -->
        <div id="lobby" class="lobby">
            <div class="pixel-snake-logo">
                <div class="pixel-row">
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell snake snake-head"></div>
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell"></div>
                </div>
                <div class="pixel-row">
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell snake"></div>
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell"></div>
                </div>
                <div class="pixel-row">
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell snake"></div>
                    <div class="pixel-cell snake"></div>
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell"></div>
                </div>
                <div class="pixel-row">
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell snake"></div>
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell"></div>
                </div>
                <div class="pixel-row">
                    <div class="pixel-cell snake"></div>
                    <div class="pixel-cell snake"></div>
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell"></div>
                    <div class="pixel-cell"></div>
                </div>
            </div>
            <h1>SNAKE</h1>
            <div class="subtitle">Glowing Trail · Global Leaderboard</div>
            <div class="input-group">
                <input type="text" id="lobbyNameInput" placeholder="Votre nom" maxlength="20">
            </div>
            <div class="buttons">
                <button class="lobby-btn" id="startGameBtn"><i class="fas fa-play"></i> Start Game</button>
                <button class="lobby-btn leaderboard-link" id="showLeaderboardBtn"><i class="fas fa-crown"></i> Leaderboard</button>
            </div>
            <div style="margin-top: 20px; font-size: 14px; color: #aaa;">
                Utilisez les flèches ou les touches
            </div>
        </div>

        <!-- Game Wrapper -->
        <div id="gameWrapper" class="game-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="score-board">🍎 Score: <span id="score">0</span></div>
            <div class="current-player" id="playerDisplay"></div>
            
            <div class="touch-controls">
                <div class="arrow-row">
                    <div class="arrow-btn" id="btnUp"><i class="fas fa-arrow-up"></i></div>
                </div>
                <div class="arrow-row">
                    <div class="arrow-btn" id="btnLeft"><i class="fas fa-arrow-left"></i></div>
                    <div class="arrow-btn" id="btnDown"><i class="fas fa-arrow-down"></i></div>
                    <div class="arrow-btn" id="btnRight"><i class="fas fa-arrow-right"></i></div>
                </div>
            </div>
            <div class="back-to-lobby">
                <button id="backToLobbyBtn"><i class="fas fa-arrow-left"></i> Back to Lobby</button>
            </div>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="leaderboard-modal">
        <div class="leaderboard-panel">
            <div class="leaderboard-header">
                <h2><i class="fas fa-crown"></i> Global Hall of Fame</h2>
                <button class="close-btn" id="closeLeaderboardBtn">&times;</button>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                <button class="refresh-btn" id="refreshLeaderboardBtn">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
            <div id="scoresContainer">
                <ul class="scores-list" id="scoreList">
                    <li class="loading-msg">Loading scores...</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // ---------- CONFIGURATION ----------
        const API_URL = 'https://snake-backend.onrender.com/api/scores'; // REPLACE WITH YOUR RENDER URL

        // ---------- DOM Elements ----------
        const lobby = document.getElementById('lobby');
        const gameWrapper = document.getElementById('gameWrapper');
        const lobbyNameInput = document.getElementById('lobbyNameInput');
        const startGameBtn = document.getElementById('startGameBtn');
        const backToLobbyBtn = document.getElementById('backToLobbyBtn');
        const playerDisplay = document.getElementById('playerDisplay');
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('score');
        
        const showLeaderboardBtn = document.getElementById('showLeaderboardBtn');
        const leaderboardModal = document.getElementById('leaderboardModal');
        const closeLeaderboardBtn = document.getElementById('closeLeaderboardBtn');
        const refreshLeaderboardBtn = document.getElementById('refreshLeaderboardBtn');
        const scoreListEl = document.getElementById('scoreList');

        const btnUp = document.getElementById('btnUp');
        const btnDown = document.getElementById('btnDown');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        // ---------- Player Name ----------
        let playerName = localStorage.getItem('snakePlayerName') || '';
        if (playerName) {
            lobbyNameInput.value = playerName;
        }

        function startGame() {
            let name = lobbyNameInput.value.trim();
            if (name === '') name = 'Challenger';
            playerName = name;
            localStorage.setItem('snakePlayerName', playerName);
            playerDisplay.textContent = `🎮 Playing as: ${playerName}`;
            
            lobby.style.display = 'none';
            gameWrapper.style.display = 'block';
            
            resetGame();
        }

        startGameBtn.addEventListener('click', startGame);
        lobbyNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startGame();
        });

        backToLobbyBtn.addEventListener('click', () => {
            gameWrapper.style.display = 'none';
            lobby.style.display = 'block';
        });

        // ---------- Taunts ----------
        const tauntTemplates = [
            "Is this your best, {name}?",
            "That all you got, {name}?",
            "You can do better, {name}!",
            "Even a snail moves faster, {name}...",
            "Need a boost, {name}?",
            "Was that deliberate, {name}?",
            "I've seen better from a caterpillar, {name}.",
            "Seriously, {name}?",
            "My grandmother plays better, {name}.",
            "Maybe try a different game, {name}?",
            "R.I.P. snake... and your pride, {name}.",
            "Do you need a tutorial, {name}?",
            "The snake is embarrassed for you, {name}.",
            "Game over... obviously, {name}.",
            "Downward spiral much, {name}?",
            "Ouch, that had to hurt, {name}.",
            "You'll get 'em next time... maybe, {name}.",
            "I'm not impressed, {name}.",
            "It's okay to quit now, {name}.",
            "Scoreboard says: not great, {name}."
        ];

        // ---------- Leaderboard ----------
        let highScores = [];

        async function fetchScores() {
            scoreListEl.innerHTML = '<li class="loading-msg">Loading scores...</li>';
            
            const timeout = new Promise((_, reject) =>
                setTimeout(() => reject(new Error('Request timed out')), 10000)
            );

            try {
                const res = await Promise.race([fetch(API_URL), timeout]);
                if (!res.ok) throw new Error(`HTTP error ${res.status}`);
                const data = await res.json();
                highScores = data;
                renderLeaderboard();
            } catch (err) {
                console.error('Fetch error:', err);
                let errorMsg = '⚠️ Could not load scores.';
                if (err.message.includes('timed out')) {
                    errorMsg = '⚠️ Request timed out. The backend might be waking up. Try again in a few seconds.';
                } else if (err.message.includes('Failed to fetch')) {
                    errorMsg = '⚠️ Cannot reach the server. Check your internet or backend URL.';
                }
                scoreListEl.innerHTML = `<li class="error-msg">${errorMsg}</li>`;
            }
        }

        function renderLeaderboard() {
            if (!highScores || highScores.length === 0) {
                scoreListEl.innerHTML = '<li style="text-align: center; padding: 20px; color: #aaa;">No scores yet. Be the first!</li>';
                return;
            }
            let html = '';
            highScores.forEach((entry, idx) => {
                const date = new Date(entry.date).toLocaleDateString();
                html += `<li>
                    <span class="rank">${idx+1}.</span>
                    <span class="name">${entry.name}</span>
                    <span class="score">${entry.score}</span>
                    <span class="date">${date}</span>
                </li>`;
            });
            scoreListEl.innerHTML = html;
        }

        async function addScore(name, score) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, score })
                });
                if (!res.ok) throw new Error('Network error');
                highScores = await res.json();
                if (leaderboardModal.classList.contains('active')) {
                    renderLeaderboard();
                }
            } catch (err) {
                console.error('Failed to save score', err);
            }
        }

        fetch(API_URL).catch(() => {});

        showLeaderboardBtn.addEventListener('click', () => {
            leaderboardModal.classList.add('active');
            fetchScores();
        });
        closeLeaderboardBtn.addEventListener('click', () => {
            leaderboardModal.classList.remove('active');
        });
        refreshLeaderboardBtn.addEventListener('click', fetchScores);
        leaderboardModal.addEventListener('click', (e) => {
            if (e.target === leaderboardModal) {
                leaderboardModal.classList.remove('active');
            }
        });

        // ---------- Game Settings ----------
        const GRID_SIZE = 20;
        const CELL_SIZE = 20;
        canvas.width = GRID_SIZE * CELL_SIZE;
        canvas.height = GRID_SIZE * CELL_SIZE;

        let snake = [
            [10, 10],
            [10, 9],
            [10, 8]
        ];
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let food = [15, 15];
        let score = 0;
        let gameOver = false;
        let gameInterval = null;
        let gameOverTaunt = '';

        // ----- Color selection based on player name -----
        function getSnakeColors() {
            const isYousef = playerName && playerName.toUpperCase() === 'YOUSEF';
            if (isYousef) {
                return {
                    headFill: '#4a90e2',      // Bright blue
                    headShadow: '#4a90e2',
                    bodyFill: '#2a5c9e',       // Darker blue
                    bodyShadow: '#2a5c9e'
                };
            } else {
                return {
                    headFill: '#4ecca3',       // Bright green
                    headShadow: '#4ecca3',
                    bodyFill: '#2b7a62',       // Darker green
                    bodyShadow: '#2b7a62'
                };
            }
        }

        function randomFood() {
            let newFood;
            do {
                newFood = [
                    Math.floor(Math.random() * GRID_SIZE),
                    Math.floor(Math.random() * GRID_SIZE)
                ];
            } while (snake.some(segment => segment[0] === newFood[0] && segment[1] === newFood[1]));
            food = newFood;
        }

        function resetGame() {
            snake = [
                [10, 10],
                [10, 9],
                [10, 8]
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameOver = false;
            gameOverTaunt = '';
            updateScore();
            randomFood();
        }

        function updateScore() {
            scoreSpan.textContent = score;
        }

        function endGame() {
            gameOver = true;
            addScore(playerName || 'Anonymous', score);
            const randomIndex = Math.floor(Math.random() * tauntTemplates.length);
            gameOverTaunt = tauntTemplates[randomIndex].replace(/{name}/g, playerName || 'Challenger');
        }

        function move() {
            if (gameOver) return;

            if ((nextDirection === 'UP' && direction !== 'DOWN') ||
                (nextDirection === 'DOWN' && direction !== 'UP') ||
                (nextDirection === 'LEFT' && direction !== 'RIGHT') ||
                (nextDirection === 'RIGHT' && direction !== 'LEFT')) {
                direction = nextDirection;
            }

            const head = snake[0].slice();
            switch (direction) {
                case 'RIGHT': head[1]++; break;
                case 'LEFT':  head[1]--; break;
                case 'UP':    head[0]--; break;
                case 'DOWN':  head[0]++; break;
            }

            if (head[0] < 0 || head[0] >= GRID_SIZE || head[1] < 0 || head[1] >= GRID_SIZE) {
                endGame();
                return;
            }

            if (snake.some(segment => segment[0] === head[0] && segment[1] === head[1])) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head[0] === food[0] && head[1] === food[1]) {
                score += 10;
                updateScore();
                randomFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!gameOver) {
                // Draw normal game
                // Grid lines
                ctx.strokeStyle = '#2d4059';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(canvas.width, i * CELL_SIZE);
                    ctx.stroke();
                }

                // Food
                ctx.fillStyle = '#ff6b6b';
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 15;
                ctx.fillRect(food[1] * CELL_SIZE, food[0] * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                ctx.shadowBlur = 0;

                // Snake with trail – use colors based on name
                const colors = getSnakeColors();
                const snakeLength = snake.length;
                snake.forEach((segment, index) => {
                    const [row, col] = segment;
                    const opacity = 1 - (index / snakeLength) * 0.8;
                    ctx.globalAlpha = opacity;
                    if (index === 0) {
                        ctx.fillStyle = colors.headFill;
                        ctx.shadowColor = colors.headShadow;
                        ctx.shadowBlur = 15;
                    } else {
                        ctx.fillStyle = colors.bodyFill;
                        ctx.shadowColor = colors.bodyShadow;
                        ctx.shadowBlur = 8 * (1 - index / snakeLength);
                    }
                    ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                });
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
            } else {
                // Draw pixel game over screen
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.font = '20px "Press Start 2P", monospace';
                ctx.fillStyle = '#ff6b6b';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, 100);

                ctx.font = '12px "Press Start 2P", monospace';
                ctx.fillStyle = '#fff';
                ctx.fillText(`SCORE: ${score}`, canvas.width/2, 170);

                ctx.font = '10px "Press Start 2P", monospace';
                ctx.fillStyle = '#ffd93d';
                // Wrap taunt
                let tauntLines = [];
                let words = gameOverTaunt.split(' ');
                let line = '';
                for (let w of words) {
                    let testLine = line + (line ? ' ' : '') + w;
                    let metrics = ctx.measureText(testLine);
                    if (metrics.width > 350 && line !== '') {
                        tauntLines.push(line);
                        line = w;
                    } else {
                        line = testLine;
                    }
                }
                tauntLines.push(line);
                for (let i = 0; i < tauntLines.length; i++) {
                    ctx.fillText(tauntLines[i], canvas.width/2, 210 + i*20);
                }

                // Draw pixel button
                const buttonX = canvas.width/2 - 80;
                const buttonY = 280;
                const buttonW = 160;
                const buttonH = 40;

                ctx.fillStyle = '#4ecca3';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#4ecca3';
                ctx.fillRect(buttonX, buttonY, buttonW, buttonH);
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(buttonX, buttonY, buttonW, buttonH);

                ctx.font = '12px "Press Start 2P", monospace';
                ctx.fillStyle = '#000';
                ctx.fillText('REPLAY', canvas.width/2, buttonY + 26);
            }
        }

        // Handle canvas click for replay button
        function handleCanvasClick(e) {
            if (!gameOver) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;

            const buttonX = canvas.width/2 - 80;
            const buttonY = 280;
            const buttonW = 160;
            const buttonH = 40;

            if (canvasX >= buttonX && canvasX <= buttonX + buttonW &&
                canvasY >= buttonY && canvasY <= buttonY + buttonH) {
                resetGame();
            }
        }

        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', handleCanvasClick, { passive: false });

        function gameTick() {
            move();
            draw();
        }

        // Controls
        function setDirection(newDir) {
            if (newDir === 'UP' && direction !== 'DOWN') nextDirection = 'UP';
            else if (newDir === 'DOWN' && direction !== 'UP') nextDirection = 'DOWN';
            else if (newDir === 'LEFT' && direction !== 'RIGHT') nextDirection = 'LEFT';
            else if (newDir === 'RIGHT' && direction !== 'LEFT') nextDirection = 'RIGHT';
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key;
            e.preventDefault();
            if (key === 'ArrowUp') setDirection('UP');
            else if (key === 'ArrowDown') setDirection('DOWN');
            else if (key === 'ArrowLeft') setDirection('LEFT');
            else if (key === 'ArrowRight') setDirection('RIGHT');
        });

        function handleButtonPress(dir) {
            return function(e) {
                e.preventDefault();
                setDirection(dir);
            };
        }

        if (btnUp) {
            btnUp.addEventListener('mousedown', handleButtonPress('UP'));
            btnUp.addEventListener('touchstart', handleButtonPress('UP'), { passive: false });
        }
        if (btnDown) {
            btnDown.addEventListener('mousedown', handleButtonPress('DOWN'));
            btnDown.addEventListener('touchstart', handleButtonPress('DOWN'), { passive: false });
        }
        if (btnLeft) {
            btnLeft.addEventListener('mousedown', handleButtonPress('LEFT'));
            btnLeft.addEventListener('touchstart', handleButtonPress('LEFT'), { passive: false });
        }
        if (btnRight) {
            btnRight.addEventListener('mousedown', handleButtonPress('RIGHT'));
            btnRight.addEventListener('touchstart', handleButtonPress('RIGHT'), { passive: false });
        }

        // Start game loop
        resetGame();
        gameInterval = setInterval(gameTick, 150);
    </script>
</body>
</html>
